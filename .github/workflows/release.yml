name: Release Publish and Verification

on:
  workflow_run:
    workflows:
      - Release Candidate Verification
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: release-publish-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

env:
  # Keep this pinned version aligned with ui/package.json's packageManager value.
  BUN_VERSION: 1.3.12
  GORELEASER_VERSION: v2.12.7

jobs:
  resolve-release-tag:
    name: Resolve Release Tag
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push'
      }}
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - name: Check out release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go from go.mod
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Resolve semver tag for released commit
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          output="$(go run ./cmd/releasetagcheck -points-at HEAD)"
          printf '%s\n' "$output"
          printf '%s\n' "$output" >> "$GITHUB_OUTPUT"

      - name: Derive GoReleaser asset version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ steps.tag.outputs.release_tag }}"
          release_version="${release_tag#v}"
          printf 'release_version=%s\n' "$release_version" >> "$GITHUB_OUTPUT"

  publish-release:
    name: Publish GitHub Release
    needs: resolve-release-tag
    runs-on: ubuntu-latest
    steps:
      - name: Check out release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check out release tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git checkout --detach "${{ needs.resolve-release-tag.outputs.release_tag }}"

      - name: Set up Go from go.mod
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Bun for the dashboard workspace
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dashboard dependencies
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Publish GitHub release assets from the tagged commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run github.com/goreleaser/goreleaser/v2@${{ env.GORELEASER_VERSION }} release --clean -f .goreleaser.yml

  smoke-released-artifacts:
    name: Smoke Released Artifacts (${{ matrix.asset_id }})
    needs:
      - resolve-release-tag
      - publish-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_id: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            archive_extension: .tar.gz
            binary_name: agent-factory
          - asset_id: linux-arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            archive_extension: .tar.gz
            binary_name: agent-factory
          - asset_id: darwin-amd64
            runner: macos-15-intel
            goos: darwin
            goarch: amd64
            archive_extension: .tar.gz
            binary_name: agent-factory
          - asset_id: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            archive_extension: .tar.gz
            binary_name: agent-factory
          - asset_id: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            archive_extension: .zip
            binary_name: agent-factory.exe
          - asset_id: windows-arm64
            runner: windows-11-arm
            goos: windows
            goarch: arm64
            archive_extension: .zip
            binary_name: agent-factory.exe
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go from go.mod
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Bun for the dashboard workspace
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dashboard dependencies
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Install Playwright browser on Linux
        if: runner.os == 'Linux'
        working-directory: ui
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright browser on non-Linux runners
        if: runner.os != 'Linux'
        working-directory: ui
        run: bunx playwright install chromium

      - name: Download published release asset on Unix
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist smoke-output
          asset_name="agent-factory_${{ needs.resolve-release-tag.outputs.release_version }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.archive_extension }}"
          printf '%s\n' "$asset_name" > "smoke-output/${{ matrix.asset_id }}-asset.txt"
          gh release download "${{ needs.resolve-release-tag.outputs.release_tag }}" \
            --repo "${{ github.event.workflow_run.repository.full_name }}" \
            --pattern "$asset_name" \
            --dir dist

      - name: Download published release asset on Windows
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          New-Item -ItemType Directory -Path smoke-output -Force | Out-Null
          $assetName = "agent-factory_${{ needs.resolve-release-tag.outputs.release_version }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.archive_extension }}"
          $assetName | Out-File -FilePath "smoke-output/${{ matrix.asset_id }}-asset.txt" -Encoding utf8
          gh release download "${{ needs.resolve-release-tag.outputs.release_tag }}" `
            --repo "${{ github.event.workflow_run.repository.full_name }}" `
            --pattern $assetName `
            --dir dist

      - name: Extract released archive on Unix
        if: runner.os != 'Windows'
        id: extract-unix
        shell: bash
        run: |
          set -euo pipefail
          archive="dist/agent-factory_${{ needs.resolve-release-tag.outputs.release_version }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.archive_extension }}"
          if [ ! -f "$archive" ]; then
            echo "released archive not found: $archive" >&2
            exit 1
          fi
          mkdir -p extracted
          tar -xzf "$archive" -C extracted
          binary="$(pwd)/extracted/${{ matrix.binary_name }}"
          chmod +x "$binary"
          echo "binary_path=$binary" >> "$GITHUB_OUTPUT"

      - name: Extract released archive on Windows
        if: runner.os == 'Windows'
        id: extract-windows
        shell: pwsh
        run: |
          $archive = "dist/agent-factory_${{ needs.resolve-release-tag.outputs.release_version }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.archive_extension }}"
          if (-not (Test-Path -LiteralPath $archive)) {
            Write-Error "released archive not found: $archive"
          }
          New-Item -ItemType Directory -Path extracted -Force | Out-Null
          Expand-Archive -LiteralPath $archive -DestinationPath extracted -Force
          $binary = (Resolve-Path "extracted/${{ matrix.binary_name }}").Path
          "binary_path=$binary" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Smoke released binary on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          sh ./scripts/release/smoke-artifact.sh \
            "${{ steps.extract-unix.outputs.binary_path }}" \
            "tests/release/testdata/cli_smoke_factory" \
            > "smoke-output/${{ matrix.asset_id }}-result.json" \
            2> "smoke-output/${{ matrix.asset_id }}-error.json"

      - name: Smoke released binary on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/release/smoke-artifact.ps1 `
            -BinaryPath "${{ steps.extract-windows.outputs.binary_path }}" `
            -FixturePath "tests/release/testdata/cli_smoke_factory" `
            1> "smoke-output/${{ matrix.asset_id }}-result.json" `
            2> "smoke-output/${{ matrix.asset_id }}-error.json"

      - name: Upload released-artifact smoke output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-smoke-${{ matrix.asset_id }}
          path: smoke-output
          if-no-files-found: error
