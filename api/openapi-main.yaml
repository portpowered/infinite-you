openapi: 3.0.3
info:
  title: Agent Factory API
  version: 0.1.0
  license:
    name: MIT
  description: |
    Current Agent Factory runtime API contract. This file captures existing
    handler behavior for schema standardization and intentionally does not
    redesign route names, pagination, or response fields.
servers:
  - url: http://localhost:8080
    description: Local Agent Factory API server
security: []
tags:
  - name: Work
    description: Runtime work submission and inspection.
  - name: Factory
    description: Named factory activation and current-factory inspection.
  - name: Runtime
    description: Runtime state, event stream, and trace inspection.
  - name: Workflows
    description: Stored workflow inspection.
paths:
  /work:
    post:
      tags:
        - Work
      operationId: submitWork
      summary: Submit work
      description: Submits one work item to the running factory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitWorkRequest'
      responses:
        '201':
          description: Work was accepted for processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitWorkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags:
        - Work
      operationId: listWork
      summary: List work
      description: Lists current work tokens from the engine state snapshot.
      parameters:
        - $ref: '#/components/parameters/MaxResults'
        - $ref: '#/components/parameters/NextToken'
      responses:
        '200':
          description: Current work tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListWorkResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /work-requests/{request_id}:
    put:
      tags:
        - Work
      operationId: upsertWorkRequest
      summary: Upsert work request
      description: Submits or retries one canonical work request batch. The request identifier in the URL must match the request_id in the JSON body, and repeated request IDs are idempotent.
      parameters:
        - name: request_id
          in: path
          required: true
          description: Stable request identifier used for idempotent submission.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkRequest'
      responses:
        '201':
          description: Work request was accepted or had already been accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertWorkRequestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /work/{id}:
    get:
      tags:
        - Work
      operationId: getWork
      summary: Get work token
      description: Returns one token by token ID from the current marking.
      parameters:
        - $ref: '#/components/parameters/WorkOrTokenID'
      responses:
        '200':
          description: Work token with history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /events:
    get:
      tags:
        - Runtime
      operationId: getEvents
      summary: Stream factory events
      description: Streams current-process canonical factory events as default Server-Sent Events. Historical events are sent first in ascending tick order, followed by live events on the same connection.
      responses:
        '200':
          description: Factory event stream.
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events where each data frame is serialized JSON matching FactoryEvent.
              x-event-schema:
                $ref: '#/components/schemas/FactoryEvent'
        '500':
          $ref: '#/components/responses/InternalError'
  /status:
    get:
      tags:
        - Runtime
      operationId: getStatus
      summary: Get runtime status
      description: Returns the current factory lifecycle status, token category counts, and resource availability from the aggregate engine snapshot.
      responses:
        '200':
          description: Current runtime status summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /factory:
    post:
      tags:
        - Factory
      operationId: createFactory
      summary: Create named factory
      description: Stores one named factory definition and activates it as the current factory when the runtime is idle.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamedFactory'
      responses:
        '201':
          description: Named factory was stored and activated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamedFactory'
        '400':
          $ref: '#/components/responses/CreateFactoryBadRequest'
        '409':
          $ref: '#/components/responses/CreateFactoryConflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /factory/~current:
    get:
      tags:
        - Factory
      operationId: getCurrentFactory
      summary: Get current named factory
      description: Returns the active named factory from the durable current-factory pointer and canonical flattened factory payload.
      responses:
        '200':
          description: Current active named factory.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamedFactory'
        '404':
          $ref: '#/components/responses/CurrentFactoryNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  parameters:
    MaxResults:
      name: maxResults
      in: query
      required: false
      description: Optional positive page size. Invalid or non-positive values are ignored by current handlers.
      schema:
        type: integer
        minimum: 1
        default: 50
    NextToken:
      name: nextToken
      in: query
      required: false
      description: Optional base64-encoded token ID cursor.
      schema:
        type: string
    WorkOrTokenID:
      name: id
      in: path
      required: true
      description: Work or token identifier, depending on route.
      schema:
        type: string
  responses:
    BadRequest:
      description: Request payload or parameter was invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    CreateFactoryBadRequest:
      description: Named factory name or payload was invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidFactoryName:
              summary: Factory name failed validation.
              value:
                message: Factory name must be a safe directory segment without path separators.
                family: BAD_REQUEST
                code: INVALID_FACTORY_NAME
            invalidFactory:
              summary: Factory payload failed validation.
              value:
                message: Factory payload is not a valid Agent Factory definition.
                family: BAD_REQUEST
                code: INVALID_FACTORY
    CreateFactoryConflict:
      description: Named factory could not be activated because the name already exists or the current runtime is not idle.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            factoryAlreadyExists:
              summary: Factory name already exists.
              value:
                message: Named factory already exists.
                family: CONFLICT
                code: FACTORY_ALREADY_EXISTS
            factoryNotIdle:
              summary: Runtime is not idle.
              value:
                message: Current factory runtime must be idle before activation.
                family: CONFLICT
                code: FACTORY_NOT_IDLE
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    CurrentFactoryNotFound:
      description: Current named factory was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            currentFactoryMissing:
              summary: No current named factory is available.
              value:
                message: Current named factory not found.
                family: NOT_FOUND
                code: NOT_FOUND
    InternalError:
      description: Server failed while reading or building runtime state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    SubmitWorkRequest:
      $ref: './components/schemas/runtime/SubmitWorkRequest.yaml'
    SubmitWorkResponse:
      $ref: './components/schemas/runtime/SubmitWorkResponse.yaml'
    UpsertWorkRequestResponse:
      $ref: './components/schemas/runtime/UpsertWorkRequestResponse.yaml'
    ListWorkResponse:
      $ref: './components/schemas/runtime/ListWorkResponse.yaml'
    PaginationContext:
      $ref: './components/schemas/runtime/PaginationContext.yaml'
    TokenResponse:
      $ref: './components/schemas/runtime/TokenResponse.yaml'
    TokenHistory:
      $ref: './components/schemas/runtime/TokenHistory.yaml'
    ResourceUsage:
      $ref: './components/schemas/shared/ResourceUsage.yaml'
    ResourceRequirement:
      $ref: './components/schemas/shared/ResourceRequirement.yaml'
    StatusCategories:
      $ref: './components/schemas/runtime/StatusCategories.yaml'
    StatusResponse:
      $ref: './components/schemas/runtime/StatusResponse.yaml'
    ErrorFamily:
      $ref: './components/schemas/runtime/ErrorFamily.yaml'
    ErrorResponse:
      $ref: './components/schemas/runtime/ErrorResponse.yaml'
    StringMap:
      $ref: './components/schemas/shared/StringMap.yaml'
    IntegerMap:
      $ref: './components/schemas/shared/IntegerMap.yaml'
    FactoryName:
      $ref: './components/schemas/factory-config/FactoryName.yaml'
    NamedFactory:
      $ref: './components/schemas/factory-config/NamedFactory.yaml'
    FactoryWorldWorkstationRequestProjectionSlice:
      type: object
      additionalProperties: false
      description: >-
        Additive dashboard read-model contract slice that publishes
        workstation-request projections keyed by dispatch ID without
        reintroducing removed `/dashboard` endpoints.
      properties:
        workstation_requests_by_dispatch_id:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/FactoryWorldWorkstationRequestView'
    FactoryWorldRenderedPromptDiagnostic:
      type: object
      additionalProperties: false
      properties:
        system_prompt_hash:
          type: string
        user_message_hash:
          type: string
        variables:
          $ref: '#/components/schemas/StringMap'
    FactoryWorldProviderDiagnostic:
      type: object
      additionalProperties: false
      properties:
        provider:
          type: string
        model:
          type: string
        request_metadata:
          $ref: '#/components/schemas/StringMap'
        response_metadata:
          $ref: '#/components/schemas/StringMap'
    FactoryWorldWorkDiagnostics:
      type: object
      additionalProperties: false
      properties:
        rendered_prompt:
          $ref: '#/components/schemas/FactoryWorldRenderedPromptDiagnostic'
        provider:
          $ref: '#/components/schemas/FactoryWorldProviderDiagnostic'
    FactoryWorldWorkItemRef:
      type: object
      additionalProperties: false
      required:
        - work_id
      properties:
        work_id:
          type: string
        work_type_id:
          type: string
        display_name:
          type: string
        current_chaining_trace_id:
          type: string
        previous_chaining_trace_ids:
          type: array
          items:
            type: string
        trace_id:
          type: string
    FactoryWorldTokenView:
      type: object
      additionalProperties: false
      required:
        - token_id
        - place_id
      properties:
        token_id:
          type: string
        place_id:
          type: string
        name:
          type: string
        work_id:
          type: string
        work_type_id:
          type: string
        current_chaining_trace_id:
          type: string
        previous_chaining_trace_ids:
          type: array
          items:
            type: string
        trace_id:
          type: string
        tags:
          $ref: '#/components/schemas/StringMap'
    FactoryWorldMutationView:
      type: object
      additionalProperties: false
      required:
        - type
        - token_id
      properties:
        type:
          type: string
        token_id:
          type: string
        from_place:
          type: string
        to_place:
          type: string
        reason:
          type: string
        token:
          $ref: '#/components/schemas/FactoryWorldTokenView'
    FactoryWorldScriptRequestView:
      type: object
      additionalProperties: false
      properties:
        script_request_id:
          type: string
        attempt:
          type: integer
          minimum: 1
        command:
          type: string
        args:
          type: array
          items:
            type: string
    FactoryWorldScriptResponseView:
      type: object
      additionalProperties: false
      properties:
        script_request_id:
          type: string
        attempt:
          type: integer
          minimum: 1
        outcome:
          type: string
        stdout:
          type: string
        stderr:
          type: string
        duration_millis:
          type: integer
          format: int64
          minimum: 0
        exit_code:
          type: integer
        failure_type:
          type: string
    FactoryWorldWorkstationRequestCountView:
      type: object
      additionalProperties: false
      required:
        - dispatched_count
        - responded_count
        - errored_count
      properties:
        dispatched_count:
          type: integer
          minimum: 0
        responded_count:
          type: integer
          minimum: 0
        errored_count:
          type: integer
          minimum: 0
    FactoryWorldWorkstationRequestRequestView:
      type: object
      additionalProperties: false
      properties:
        started_at:
          type: string
        request_time:
          type: string
        input_work_items:
          type: array
          items:
            $ref: '#/components/schemas/FactoryWorldWorkItemRef'
        input_work_type_ids:
          type: array
          items:
            type: string
        current_chaining_trace_id:
          type: string
        previous_chaining_trace_ids:
          type: array
          items:
            type: string
        trace_ids:
          type: array
          items:
            type: string
        consumed_tokens:
          type: array
          items:
            $ref: '#/components/schemas/FactoryWorldTokenView'
        prompt:
          type: string
        working_directory:
          type: string
        worktree:
          type: string
        provider:
          type: string
        model:
          type: string
        request_metadata:
          $ref: '#/components/schemas/StringMap'
        script_request:
          $ref: '#/components/schemas/FactoryWorldScriptRequestView'
    FactoryWorldWorkstationRequestResponseView:
      type: object
      additionalProperties: false
      properties:
        outcome:
          type: string
        feedback:
          type: string
        failure_reason:
          type: string
        failure_message:
          type: string
        response_text:
          type: string
        error_class:
          type: string
        provider_session:
          $ref: '#/components/schemas/ProviderSessionMetadata'
        diagnostics:
          $ref: '#/components/schemas/FactoryWorldWorkDiagnostics'
        response_metadata:
          $ref: '#/components/schemas/StringMap'
        script_response:
          $ref: '#/components/schemas/FactoryWorldScriptResponseView'
        end_time:
          type: string
        duration_millis:
          type: integer
          format: int64
          minimum: 0
        output_work_items:
          type: array
          items:
            $ref: '#/components/schemas/FactoryWorldWorkItemRef'
        output_mutations:
          type: array
          items:
            $ref: '#/components/schemas/FactoryWorldMutationView'
    FactoryWorldWorkstationRequestView:
      type: object
      additionalProperties: false
      required:
        - dispatch_id
        - transition_id
        - counts
        - request
      properties:
        dispatch_id:
          type: string
        transition_id:
          type: string
        workstation_name:
          type: string
        counts:
          $ref: '#/components/schemas/FactoryWorldWorkstationRequestCountView'
        request:
          $ref: '#/components/schemas/FactoryWorldWorkstationRequestRequestView'
        response:
          $ref: '#/components/schemas/FactoryWorldWorkstationRequestResponseView'

    # ==== Unified Agent Factory event log schemas =======
    FactoryEvent:
      $ref: './components/schemas/events/FactoryEvent.yaml'
    FactoryEventType:
      $ref: './components/schemas/events/FactoryEventType.yaml'
    FactoryEventContext:
      $ref: './components/schemas/events/FactoryEventContext.yaml'
    DispatchConsumedWorkRef:
      $ref: './components/schemas/events/DispatchConsumedWorkRef.yaml'
    DispatchRequestEventMetadata:
      $ref: './components/schemas/events/DispatchRequestEventMetadata.yaml'
    RunRequestEventPayload:
      $ref: './components/schemas/events/payloads/RunRequestEventPayload.yaml'
    InitialStructureRequestEventPayload:
      $ref: './components/schemas/events/payloads/InitialStructureRequestEventPayload.yaml'
    WorkRequestEventPayload:
      $ref: './components/schemas/events/payloads/WorkRequestEventPayload.yaml'
    RelationshipChangeRequestEventPayload:
      $ref: './components/schemas/events/payloads/RelationshipChangeRequestEventPayload.yaml'
    DispatchRequestEventPayload:
      $ref: './components/schemas/events/payloads/DispatchRequestEventPayload.yaml'
    InferenceRequestEventPayload:
      $ref: './components/schemas/events/payloads/InferenceRequestEventPayload.yaml'
    InferenceResponseEventPayload:
      $ref: './components/schemas/events/payloads/InferenceResponseEventPayload.yaml'
    ScriptRequestEventPayload:
      $ref: './components/schemas/events/payloads/ScriptRequestEventPayload.yaml'
    ScriptResponseEventPayload:
      $ref: './components/schemas/events/payloads/ScriptResponseEventPayload.yaml'
    DispatchResponseEventPayload:
      $ref: './components/schemas/events/payloads/DispatchResponseEventPayload.yaml'
    FactoryStateResponseEventPayload:
      $ref: './components/schemas/events/payloads/FactoryStateResponseEventPayload.yaml'
    RunResponseEventPayload:
      $ref: './components/schemas/events/payloads/RunResponseEventPayload.yaml'
    InferenceOutcome:
      $ref: './components/schemas/events/InferenceOutcome.yaml'
    ScriptExecutionOutcome:
      $ref: './components/schemas/events/ScriptExecutionOutcome.yaml'
    ScriptFailureType:
      $ref: './components/schemas/events/ScriptFailureType.yaml'
    FactoryState:
      $ref: './components/schemas/events/FactoryState.yaml'
    WorkOutcome:
      $ref: './components/schemas/events/WorkOutcome.yaml'
    ProviderFailureMetadata:
      $ref: './components/schemas/events/ProviderFailureMetadata.yaml'
    ProviderSessionMetadata:
      $ref: './components/schemas/events/ProviderSessionMetadata.yaml'
    WorkMetrics:
      $ref: './components/schemas/events/WorkMetrics.yaml'
    WorkDiagnostics:
      $ref: './components/schemas/events/WorkDiagnostics.yaml'
    RenderedPromptDiagnostic:
      $ref: './components/schemas/events/RenderedPromptDiagnostic.yaml'
    ProviderDiagnostic:
      $ref: './components/schemas/events/ProviderDiagnostic.yaml'
    CommandDiagnostic:
      $ref: './components/schemas/shared/CommandDiagnostic.yaml'
    PanicDiagnostic:
      $ref: './components/schemas/shared/PanicDiagnostic.yaml'
    Diagnostics:
      $ref: './components/schemas/events/Diagnostics.yaml'
    SafeWorkDiagnostics:
      $ref: './components/schemas/events/SafeWorkDiagnostics.yaml'
    WallClock:
      $ref: './components/schemas/events/WallClock.yaml'

    # ==== Raw data schemas for a factor =======
    Factory:
      $ref: './components/schemas/factory-config/Factory.yaml'
    ResourceManifest:
      $ref: './components/schemas/factory-config/ResourceManifest.yaml'
    RequiredTool:
      $ref: './components/schemas/factory-config/RequiredTool.yaml'
    BundledFile:
      $ref: './components/schemas/factory-config/BundledFile.yaml'
    BundledFileContent:
      $ref: './components/schemas/factory-config/BundledFileContent.yaml'
    InputType:
      $ref: './components/schemas/factory-config/InputType.yaml'
    InputKind:
      $ref: './components/schemas/factory-config/InputKind.yaml'
    WorkType:
      $ref: './components/schemas/factory-config/WorkType.yaml'
    WorkState:
      $ref: './components/schemas/factory-config/WorkState.yaml'
    WorkStateType:
      $ref: './components/schemas/factory-config/WorkStateType.yaml'
    Resource:
      $ref: './components/schemas/factory-config/Resource.yaml'
    Worker:
      $ref: './components/schemas/factory-config/Worker.yaml'
    WorkerType:
      $ref: './components/schemas/factory-config/WorkerType.yaml'
    WorkerModelProvider:
      $ref: './components/schemas/factory-config/WorkerModelProvider.yaml'
    WorkerProvider:
      $ref: './components/schemas/factory-config/WorkerProvider.yaml'
    Workstation:
      $ref: './components/schemas/factory-config/Workstation.yaml'
    WorkstationLimits:
      $ref: './components/schemas/factory-config/WorkstationLimits.yaml'
    WorkstationKind:
      $ref: './components/schemas/factory-config/WorkstationKind.yaml'
    WorkstationType:
      $ref: './components/schemas/factory-config/WorkstationType.yaml'
    WorkstationCron:
      $ref: './components/schemas/factory-config/WorkstationCron.yaml'
    WorkstationGuardType:
      $ref: './components/schemas/factory-config/WorkstationGuardType.yaml'
    WorkstationGuard:
      $ref: './components/schemas/factory-config/WorkstationGuard.yaml'
    WorkstationGuardMatchConfig:
      $ref: './components/schemas/factory-config/WorkstationGuardMatchConfig.yaml'
    WorkstationIO:
      $ref: './components/schemas/factory-config/WorkstationIO.yaml'
    InputGuard:
      $ref: './components/schemas/factory-config/InputGuard.yaml'
    InputGuardType:
      $ref: './components/schemas/factory-config/InputGuardType.yaml'
    Transition:
      $ref: './components/schemas/factory-config/Transition.yaml'
    # ==== Raw data types here =======
    WorkRequest:
      $ref: './components/schemas/runtime/WorkRequest.yaml'
    WorkRequestType:
      $ref: './components/schemas/runtime/WorkRequestType.yaml'
    Work:
      $ref: './components/schemas/runtime/Work.yaml'
    Relation:
      $ref: './components/schemas/runtime/Relation.yaml'
    RelationType:
      $ref: './components/schemas/runtime/RelationType.yaml'
