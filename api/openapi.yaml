          description: Scheduling behavior for this workstation, such as STANDARD, REPEATER, or CRON execution.
        type:
          $ref: '#/components/schemas/WorkstationType'
          description: Runtime workstation implementation type, equivalent to the workstation AGENTS.md frontmatter type.
        worker:
          type: string
          description: Name of a worker declared in the workers list.
        promptFile:
          type: string
          description: Path to a prompt template file loaded for model-oriented workstation execution.
        outputSchema:
          type: string
          description: JSON schema string used to validate or parse structured model output when configured.
        limits:
          $ref: '#/components/schemas/WorkstationLimits'
          description: Retry and execution ceilings applied to this workstation.
        body:
          type: string
          description: Inline workstation instructions or script body when authored directly in factory config.
        promptTemplate:
          type: string
          description: Inline Go template rendered into the prompt for model-oriented workstation execution.
        cron:
          $ref: '#/components/schemas/WorkstationCron'
          description: Cron trigger configuration for workstations whose kind is cron.
        inputs:
          type: array
          description: Work states this workstation can consume before it dispatches.
          items:
            $ref: '#/components/schemas/WorkstationIO'
        outputs:
          type: array
          description: Work states emitted after this workstation succeeds.
          items:
            $ref: '#/components/schemas/WorkstationIO'
        onContinue:
          $ref: '#/components/schemas/WorkstationIO'
          description: Optional destination emitted when the workstation makes partial progress and should continue iterating.
        onRejection:
          $ref: '#/components/schemas/WorkstationIO'
          description: Optional destination emitted when the worker rejects the current work without a hard failure.
        onFailure:
          $ref: '#/components/schemas/WorkstationIO'
          description: Optional destination emitted when the workstation fails permanently.
        resources:
          type: array
          description: Resource capacity this workstation consumes while one dispatch is in flight.
          items:
            $ref: '#/components/schemas/ResourceRequirement'
        copyReferencedScripts:
          type: boolean
          description: Copy supported referenced script files into the expanded workstation layout when config expand runs.
        guards:
          type: array
          description: Guarded loop breakers should use `visit_count` guards here with a `LOGICAL_MOVE` workstation instead of top-level exhaustion rules.
          items:
            $ref: '#/components/schemas/WorkstationGuard'
        stopWords:
          type: array
          description: Stop words authored on the topology entry for model-oriented dispatches.
          items:
            type: string
        workingDirectory:
          type: string
          description: Go template resolved from token tags at dispatch time.
        worktree:
          type: string
          description: Go template resolved and passed as the worktree path to CLI dispatchers.
        env:
          $ref: '#/components/schemas/StringMap'
          description: Environment variables added to the workstation execution context.
    WorkstationLimits:
      type: object
      description: Retry and execution ceilings applied to one workstation definition.
      additionalProperties: false
      properties:
        maxRetries:
          type: integer
          description: Maximum number of retry attempts after a failed dispatch before the workstation gives up.
        maxExecutionTime:
          type: string
          description: Go duration limit for one dispatch attempt before it times out.
    WorkstationKind:
      type: string
      default: STANDARD
      description: Scheduling kind for a workstation, which determines how the engine schedules and dispatches work to it. Standard workstations are scheduled as soon as their inputs are ready, and can have multiple work items in-flight at the same time.  Repeater workstations are triggered whenever their inputs change, and will reloop the outputs on rejection back to the initial place. Cron workstations create internal time work and dispatch their configured worker when time and input guards are satisfied.
      x-enum-varnames:
        - WorkstationKindStandard
        - WorkstationKindRepeater
        - WorkstationKindCron
      enum:
        - STANDARD
        - REPEATER
        - CRON
      x-enum-descriptions:
        - Schedules when its inputs are ready and emits configured outputs.
        - Re-runs when observed inputs change and can loop rejected work back to an earlier state.
        - Produces internal time work from a cron schedule and dispatches through the normal worker path when inputs are ready.
    WorkstationType:
      type: string
      description: Runtime workstation implementation types supported by the public factory-config contract.
      x-enum-varnames:
        - WorkstationTypeModelWorkstation
        - WorkstationTypeLogicalMove
      enum:
        - MODEL_WORKSTATION
        - LOGICAL_MOVE
      x-enum-descriptions:
        - Model-backed workstation that renders prompts and dispatches work through the configured worker.
        - Logical pass-through workstation used for routing and guarded loop-breaker transitions without model execution.
    WorkstationCron:
      type: object
      description: Trigger timing for cron workstations. Cron workstations use a schedule expression; interval triggers are not supported.
      additionalProperties: false
      required:
        - schedule
      properties:
        schedule:
          type: string
          description: Standard five-field cron expression used to produce internal time work while the factory service is running.
        triggerAtStart:
          type: boolean
          default: false
          description: When true, service startup submits one immediate internal time work item before waiting for the next scheduled cron fire.
        jitter:
          type: string
          description: Non-negative Go duration used as the maximum deterministic delay added to scheduled time tokens. Defaults to "0s".
        expiryWindow:
          type: string
          description: Positive Go duration after due_at before a stale cron time token expires and can be consumed by the system expiry transition. Defaults to the duration until the next scheduled cron fire when omitted.
    WorkstationGuardType:
      type: string
      description: Guard condition that must pass before a workstation input can be used. Parent-aware fan-in guards are configured on WorkstationIO.guards.
      x-enum-varnames:
        - WorkstationGuardTypeVisitCount
        - WorkstationGuardTypeMatchesFields
      enum:
        - VISIT_COUNT
        - MATCHES_FIELDS
      x-enum-descriptions:
        - Allows or blocks work based on how many times a workstation has already handled it.
        - Requires all candidate workstation inputs to resolve the same configured field value.
    WorkstationGuard:
      type: object
      description: Guard attached to a workstation as a whole before it is allowed to consume work.
      additionalProperties: false
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/WorkstationGuardType'
          description: Guard condition to evaluate before this workstation is allowed to run.
        workstation:
          type: string
          description: For `VISIT_COUNT` guards, the workstation whose visits are counted.
        maxVisits:
          type: integer
          minimum: 1
          description: For `VISIT_COUNT` guards, the visit threshold.
        matchConfig:
          $ref: '#/components/schemas/WorkstationGuardMatchConfig'
          description: For `MATCHES_FIELDS` guards, the field-selector configuration used to compare candidate inputs.
    WorkstationGuardMatchConfig:
      type: object
      additionalProperties: false
      required:
        - inputKey
      properties:
        inputKey:
          type: string
          minLength: 1
          description: Field selector resolved against each candidate input, such as `.Name` or `.Tags["_last_output"]`.
    WorkstationIO:
      type: object
      description: One authored work-state reference consumed or emitted by a workstation.
      additionalProperties: false
      required:
        - workType
        - state
      properties:
        workType:
          type: string
          description: Name of the work type consumed or emitted at this edge of the workstation.
        state:
          type: string
          description: Name of the work state consumed or emitted for the referenced work type.
        guards:
          type: array
          description: Per-input guards that must pass before this specific input can be used.
          items:
            $ref: '#/components/schemas/InputGuard'
    InputGuard:
      type: object
      description: Guard attached to one workstation input for parent-aware fan-in or same-name matching against another input.
      additionalProperties: false
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/InputGuardType'
          description: Input guard condition to evaluate for this specific workstation input.
        parentInput:
          type: string
          description: Parent workType name from another input in the same workstation.
        matchInput:
          type: string
          description: Peer input workType name from another input in the same workstation for same-name matching.
        spawnedBy:
          type: string
          description: Workstation that spawns the children for dynamic fanout count tracking.
    InputGuardType:
      type: string
      description: Guard condition attached to a specific workstation input.
      x-enum-varnames:
        - InputGuardTypeAllChildrenComplete
        - InputGuardTypeAnyChildFailed
        - InputGuardTypeSameName
      enum:
        - ALL_CHILDREN_COMPLETE
        - ANY_CHILD_FAILED
        - SAME_NAME
      x-enum-descriptions:
        - This input is available only after all matching child work completes.
        - This input is available when any matching child work fails.
        - This input is available only when its token name exactly matches the bound token name from another input.
    Transition:
      type: object
      additionalProperties: false
      required:
        - from
        - to
      properties:
        from:
          type: string
          description: Source workstation name.
        to:
          type: string
          description: Destination workstation name.
    WorkRequest:
      type: object
      additionalProperties: false
      required:
        - requestId
        - type
      properties:
        requestId:
          type: string
          description: Stable client-provided request identifier used for idempotent batch submission.
        currentChainingTraceId:
          type: string
          description: Optional default chaining-trace identifier applied to submitted work items that omit it.
        type:
          $ref: '#/components/schemas/WorkRequestType'
        works:
          type: array
          description: A batch of work items to be submitted together.
          items:
            $ref: '#/components/schemas/Work'
        relations:
          type: array
          description: Relationships between various work items.
          items:
            $ref: '#/components/schemas/Relation'
    WorkRequestType:
      description: Kind of work request accepted by the factory.
      type: string
      x-enum-varnames:
        - WorkRequestTypeFactoryRequestBatch
      enum:
        - FACTORY_REQUEST_BATCH
      x-enum-descriptions:
        - Normalized request containing one or more work items and their relationships.
    Work:
      type: object
      description: A piece of work.
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: A human readable name for the work, not unique
        workId:
          type: string
          description: Unique identifier for the work
        requestId:
          type: string
          description: Identifier for the original request that created this work, if applicable
        workTypeName:
          type: string
          description: Configured work type name from factory.json for this submitted work item.
        state:
          type: string
          description: Explicit initial state for the submitted work item. Omit this to use the configured initial state for the work type.
        currentChainingTraceId:
          type: string
          description: Explicit chaining-trace identifier for this submitted work item.
        previousChainingTraceIds:
          type: array
          description: Explicit predecessor chaining traces that directly caused this work item.
          items:
            type: string
        traceId:
          type: string
          description: Legacy trace identifier retained for compatibility; prefer currentChainingTraceId.
        payload:
          description: Opaque work payload forwarded as raw JSON, or a binary data, or whatever else.
        tags:
          $ref: '#/components/schemas/StringMap'
          description: Key-value pairs for storing arbitrary metadata about the work. Both keys and values are strings.
    Relation:
      type: object
      additionalProperties: false
      required:
        - type
        - sourceWorkName
        - targetWorkName
      properties:
        type:
          $ref: '#/components/schemas/RelationType'
        targetWorkId:
          type: string
        targetWorkName:
          type: string
        sourceWorkName:
          type: string
        requiredState:
          type: string
    RelationType:
      type: string
      description: Relationship category between two pieces of work.
      x-enum-varnames:
        - RelationTypeDependsOn
        - RelationTypeParentChild
        - RelationTypeSpawnedBy
      enum:
        - DEPENDS_ON
        - PARENT_CHILD
        - SPAWNED_BY
      x-enum-descriptions:
        - Source work cannot proceed until the target work reaches the required state.
        - Target work is a child of the source work.
        - Target work was generated by a workstation handling the source work.
