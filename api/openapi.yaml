openapi: 3.0.3
info:
  title: Agent Factory API
  version: 0.1.0
  license:
    name: MIT
  description: |
    Current Agent Factory runtime API contract. This file captures existing
    handler behavior for schema standardization and intentionally does not
    redesign route names, pagination, or response fields.
servers:
  - url: http://localhost:8080
    description: Local Agent Factory API server
security: []
tags:
  - name: Work
    description: Runtime work submission and inspection.
  - name: Factory
    description: Named factory activation and current-factory inspection.
  - name: Runtime
    description: Runtime state, event stream, and trace inspection.
  - name: Workflows
    description: Stored workflow inspection.
paths:
  /work:
    post:
      tags:
        - Work
      operationId: submitWork
      summary: Submit work
      description: Submits one work item to the running factory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitWorkRequest'
      responses:
        '201':
          description: Work was accepted for processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitWorkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags:
        - Work
      operationId: listWork
      summary: List work
      description: Lists current work tokens from the engine state snapshot.
      parameters:
        - $ref: '#/components/parameters/MaxResults'
        - $ref: '#/components/parameters/NextToken'
      responses:
        '200':
          description: Current work tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListWorkResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /work-requests/{request_id}:
    put:
      tags:
        - Work
      operationId: upsertWorkRequest
      summary: Upsert work request
      description: Submits or retries one canonical work request batch. The request identifier in the URL must match the request_id in the JSON body, and repeated request IDs are idempotent.
      parameters:
        - name: request_id
          in: path
          required: true
          description: Stable request identifier used for idempotent submission.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkRequest'
      responses:
        '201':
          description: Work request was accepted or had already been accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertWorkRequestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /work/{id}:
    get:
      tags:
        - Work
      operationId: getWork
      summary: Get work token
      description: Returns one token by token ID from the current marking.
      parameters:
        - $ref: '#/components/parameters/WorkOrTokenID'
      responses:
        '200':
          description: Work token with history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /events:
    get:
      tags:
        - Runtime
      operationId: getEvents
      summary: Stream factory events
      description: Streams current-process canonical factory events as default Server-Sent Events. Historical events are sent first in ascending tick order, followed by live events on the same connection.
      responses:
        '200':
          description: Factory event stream.
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events where each data frame is serialized JSON matching FactoryEvent.
              x-event-schema: '#/components/schemas/FactoryEvent'
        '500':
          $ref: '#/components/responses/InternalError'
  /status:
    get:
      tags:
        - Runtime
      operationId: getStatus
      summary: Get runtime status
      description: Returns the current factory lifecycle status, token category counts, and resource availability from the aggregate engine snapshot.
      responses:
        '200':
          description: Current runtime status summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /factory:
    post:
      tags:
        - Factory
      operationId: createFactory
      summary: Create factory
      description: Stores one factory definition and activates it as the current factory when the runtime is idle.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Factory'
      responses:
        '201':
          description: Factory was stored and activated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Factory'
        '400':
          $ref: '#/components/responses/CreateFactoryBadRequest'
        '409':
          $ref: '#/components/responses/CreateFactoryConflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /factory/~current:
    get:
      tags:
        - Factory
      operationId: getCurrentFactory
      summary: Get current factory
      description: Returns the active factory from the durable current-factory pointer and canonical flattened factory payload.
      responses:
        '200':
          description: Current active factory.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Factory'
        '404':
          $ref: '#/components/responses/CurrentFactoryNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  parameters:
    MaxResults:
      name: maxResults
      in: query
      required: false
      description: Optional positive page size. Invalid or non-positive values are ignored by current handlers.
      schema:
        type: integer
        minimum: 1
        default: 50
    NextToken:
      name: nextToken
      in: query
      required: false
      description: Optional base64-encoded token ID cursor.
      schema:
        type: string
    WorkOrTokenID:
      name: id
      in: path
      required: true
      description: Work or token identifier, depending on route.
      schema:
        type: string
  responses:
    BadRequest:
      description: Request payload or parameter was invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    CreateFactoryBadRequest:
      description: Named factory name or payload was invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidFactoryName:
              summary: Factory name failed validation.
              value:
                message: Factory name must be a safe directory segment without path separators.
                family: BAD_REQUEST
                code: INVALID_FACTORY_NAME
            invalidFactory:
              summary: Factory payload failed validation.
              value:
                message: Factory payload is not a valid Agent Factory definition.
                family: BAD_REQUEST
                code: INVALID_FACTORY
    CreateFactoryConflict:
      description: Named factory could not be activated because the name already exists or the current runtime is not idle.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            factoryAlreadyExists:
              summary: Factory name already exists.
              value:
                message: Named factory already exists.
                family: CONFLICT
                code: FACTORY_ALREADY_EXISTS
            factoryNotIdle:
              summary: Runtime is not idle.
              value:
                message: Current factory runtime must be idle before activation.
                family: CONFLICT
                code: FACTORY_NOT_IDLE
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    CurrentFactoryNotFound:
      description: Current named factory was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            currentFactoryMissing:
              summary: No current named factory is available.
              value:
                message: Current named factory not found.
                family: NOT_FOUND
                code: NOT_FOUND
    InternalError:
      description: Server failed while reading or building runtime state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    SubmitWorkRequest:
      type: object
      additionalProperties: false
      required:
        - workTypeName
      properties:
        name:
          type: string
        workTypeName:
          type: string
          description: Configured work type name from factory.json to submit to.
        currentChainingTraceId:
          type: string
          description: Explicit chaining-trace identifier for the submitted work.
        traceId:
          type: string
          description: Legacy trace identifier retained for compatibility; prefer currentChainingTraceId.
        payload:
          description: Opaque work payload forwarded as raw JSON.
        tags:
          $ref: '#/components/schemas/StringMap'
        relations:
          type: array
          description: Optional token-level runtime relations preserved on the submitted work item.
          items:
            $ref: '#/components/schemas/SubmitRelation'
    SubmitRelation:
      type: object
      additionalProperties: false
      required:
        - type
        - targetWorkId
      properties:
        type:
          $ref: '#/components/schemas/RelationType'
        targetWorkId:
          type: string
          description: Target runtime work identifier for the relation.
        requiredState:
          type: string
          description: Required target state before the dependency can proceed.
    SubmitWorkResponse:
      type: object
      additionalProperties: false
      required:
        - traceId
      properties:
        traceId:
          type: string
    UpsertWorkRequestResponse:
      type: object
      additionalProperties: false
      required:
        - requestId
        - traceId
      properties:
        requestId:
          type: string
        traceId:
          type: string
    ListWorkResponse:
      type: object
      additionalProperties: false
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/TokenResponse'
        paginationContext:
          $ref: '#/components/schemas/PaginationContext'
    PaginationContext:
      type: object
      additionalProperties: false
      required:
        - maxResults
      properties:
        maxResults:
          type: integer
        nextToken:
          type: string
    TokenResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - placeId
        - workId
        - workType
        - traceId
        - createdAt
        - enteredAt
      properties:
        id:
          type: string
        placeId:
          type: string
        name:
          type: string
        workId:
          type: string
        workType:
          type: string
        traceId:
          type: string
        tags:
          $ref: '#/components/schemas/StringMap'
        createdAt:
          type: string
          format: date-time
        enteredAt:
          type: string
          format: date-time
        history:
          $ref: '#/components/schemas/TokenHistory'
    TokenHistory:
      type: object
      additionalProperties: false
      properties:
        totalVisits:
          $ref: '#/components/schemas/IntegerMap'
        consecutiveFailures:
          $ref: '#/components/schemas/IntegerMap'
        placeVisits:
          $ref: '#/components/schemas/IntegerMap'
        lastError:
          type: string
    ResourceUsage:
      type: object
      additionalProperties: false
      required:
        - name
        - available
        - total
      properties:
        name:
          type: string
        available:
          type: integer
        total:
          type: integer
    ResourceRequirement:
      type: object
      additionalProperties: false
      required:
        - name
        - capacity
      properties:
        name:
          type: string
        capacity:
          type: integer
          minimum: 1
    StatusCategories:
      type: object
      additionalProperties: false
      required:
        - initial
        - processing
        - terminal
        - failed
      properties:
        initial:
          type: integer
        processing:
          type: integer
        terminal:
          type: integer
        failed:
          type: integer
    StatusResponse:
      type: object
      additionalProperties: false
      required:
        - categories
        - factoryState
        - runtimeStatus
        - totalTokens
      properties:
        categories:
          $ref: '#/components/schemas/StatusCategories'
        factoryState:
          type: string
        runtimeStatus:
          type: string
        totalTokens:
          type: integer
        resources:
          type: array
          items:
            $ref: '#/components/schemas/ResourceUsage'
    ErrorFamily:
      type: string
      description: Stable machine-readable error family for broader client grouping.
      enum:
        - BAD_REQUEST
        - CONFLICT
        - NOT_FOUND
        - INTERNAL_SERVER_ERROR
      x-enum-varnames:
        - ErrorFamilyBadRequest
        - ErrorFamilyConflict
        - ErrorFamilyNotFound
        - ErrorFamilyInternalServerError
      x-enum-descriptions:
        - Request payload or parameter validation failed.
        - The request conflicts with current resource state.
        - The requested resource does not exist.
        - The server failed while handling an otherwise valid request.
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - message
        - family
        - code
      properties:
        message:
          type: string
        family:
          $ref: '#/components/schemas/ErrorFamily'
        code:
          type: string
          description: Stable machine-readable error code.
          enum:
            - BAD_REQUEST
            - INVALID_FACTORY_NAME
            - FACTORY_ALREADY_EXISTS
            - INVALID_FACTORY
            - FACTORY_NOT_IDLE
            - NOT_FOUND
            - INTERNAL_ERROR
          x-enum-descriptions:
            - Request payload or parameter validation failed.
            - Named factory name validation failed.
            - Submitted named factory already exists.
            - Submitted named factory payload failed validation.
            - Current factory runtime is not idle and cannot activate a new named factory.
            - The requested resource does not exist.
            - The server failed while handling an otherwise valid request.
    StringMap:
      type: object
      additionalProperties:
        type: string
    IntegerMap:
      type: object
      additionalProperties:
        type: integer
    FactoryName:
      type: string
      minLength: 1
      pattern: ^[a-z0-9](?:[a-z0-9-]*[a-z0-9])?$
      description: Customer-facing identifier for one stored named factory. Semantic validation failures return `INVALID_FACTORY_NAME`.
      example: customer-support-triage
    FactoryWorldWorkstationRequestProjectionSlice:
      type: object
      additionalProperties: false
      description: Additive dashboard read-model contract slice that publishes workstation-request projections keyed by dispatch ID without reintroducing removed `/dashboard` endpoints.
      properties:
        workstationRequestsByDispatchId:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/FactoryWorldWorkstationRequestView'
    FactoryWorldRenderedPromptDiagnostic:
      type: object
      additionalProperties: false
      properties:
        systemPromptHash:
          type: string
        userMessageHash:
          type: string
        variables:
          $ref: '#/components/schemas/StringMap'
    FactoryWorldProviderDiagnostic:
      type: object
      additionalProperties: false
      properties:
        provider:
          type: string
        model:
          type: string
        requestMetadata:
          $ref: '#/components/schemas/StringMap'
        responseMetadata:
          $ref: '#/components/schemas/StringMap'
    FactoryWorldWorkDiagnostics:
      type: object
      additionalProperties: false
      properties:
        renderedPrompt:
          $ref: '#/components/schemas/FactoryWorldRenderedPromptDiagnostic'
        provider:
          $ref: '#/components/schemas/FactoryWorldProviderDiagnostic'
    FactoryWorldWorkItemRef:
      type: object
      additionalProperties: false
      required:
        - workId
      properties:
        workId:
          type: string
        workTypeId:
          type: string
        displayName:
          type: string
        currentChainingTraceId:
          type: string
        previousChainingTraceIds:
          type: array
          items:
            type: string
        traceId:
          type: string
    FactoryWorldTokenView:
      type: object
      additionalProperties: false
      required:
        - tokenId
        - placeId
      properties:
        tokenId:
          type: string
        placeId:
          type: string
        name:
          type: string
        workId:
          type: string
        workTypeId:
          type: string
        currentChainingTraceId:
          type: string
        previousChainingTraceIds:
          type: array
          items:
            type: string
        traceId:
          type: string
        tags:
          $ref: '#/components/schemas/StringMap'
    FactoryWorldMutationView:
      type: object
      additionalProperties: false
      required:
        - type
        - tokenId
      properties:
        type:
          type: string
        tokenId:
          type: string
        fromPlace:
          type: string
        toPlace:
          type: string
        reason:
          type: string
        token:
          $ref: '#/components/schemas/FactoryWorldTokenView'
    FactoryWorldScriptRequestView:
      type: object
      additionalProperties: false
      properties:
        scriptRequestId:
          type: string
        attempt:
          type: integer
          minimum: 1
        command:
          type: string
        args:
          type: array
          items:
            type: string
    FactoryWorldScriptResponseView:
      type: object
      additionalProperties: false
      properties:
        scriptRequestId:
          type: string
        attempt:
          type: integer
          minimum: 1
        outcome:
          type: string
        stdout:
          type: string
        stderr:
          type: string
        durationMillis:
          type: integer
          format: int64
          minimum: 0
        exitCode:
          type: integer
        failureType:
          type: string
    FactoryWorldWorkstationRequestCountView:
      type: object
      additionalProperties: false
      required:
        - dispatchedCount
        - respondedCount
        - erroredCount
      properties:
        dispatchedCount:
          type: integer
          minimum: 0
        respondedCount:
          type: integer
          minimum: 0
        erroredCount:
          type: integer
          minimum: 0
    FactoryWorldWorkstationRequestRequestView:
      type: object
      additionalProperties: false
      properties:
        startedAt:
          type: string
        requestTime:
          type: string
        inputWorkItems:
          type: array
          items:
            $ref: '#/components/schemas/FactoryWorldWorkItemRef'
        inputWorkTypeIds:
          type: array
          items:
            type: string
        currentChainingTraceId:
          type: string
        previousChainingTraceIds:
          type: array
          items:
            type: string
        traceIds:
          type: array
          items:
            type: string
        consumedTokens:
          type: array
          items:
            $ref: '#/components/schemas/FactoryWorldTokenView'
        prompt:
          type: string
        workingDirectory:
          type: string
        worktree:
          type: string
        provider:
          type: string
        model:
          type: string
        requestMetadata:
          $ref: '#/components/schemas/StringMap'
        scriptRequest:
          $ref: '#/components/schemas/FactoryWorldScriptRequestView'
    FactoryWorldWorkstationRequestResponseView:
      type: object
      additionalProperties: false
      properties:
        outcome:
          type: string
        feedback:
          type: string
        failureReason:
          type: string
        failureMessage:
          type: string
        responseText:
          type: string
        errorClass:
          type: string
        providerSession:
          $ref: '#/components/schemas/ProviderSessionMetadata'
        diagnostics:
          $ref: '#/components/schemas/FactoryWorldWorkDiagnostics'
        responseMetadata:
          $ref: '#/components/schemas/StringMap'
        scriptResponse:
          $ref: '#/components/schemas/FactoryWorldScriptResponseView'
        endTime:
          type: string
        durationMillis:
          type: integer
          format: int64
          minimum: 0
        outputWorkItems:
          type: array
          items:
            $ref: '#/components/schemas/FactoryWorldWorkItemRef'
        outputMutations:
          type: array
          items:
            $ref: '#/components/schemas/FactoryWorldMutationView'
    FactoryWorldWorkstationRequestView:
      type: object
      additionalProperties: false
      required:
        - dispatchId
        - transitionId
        - counts
        - request
      properties:
        dispatchId:
          type: string
        transitionId:
          type: string
        workstationName:
          type: string
        counts:
          $ref: '#/components/schemas/FactoryWorldWorkstationRequestCountView'
        request:
          $ref: '#/components/schemas/FactoryWorldWorkstationRequestRequestView'
        response:
          $ref: '#/components/schemas/FactoryWorldWorkstationRequestResponseView'
    FactoryEvent:
      type: object
      additionalProperties: false
      description: Versioned Agent Factory event message. This is the intended canonical schema for customer event streams, history projection, record/replay artifacts, and runtime diagnostics. New fields use camelCase even when older REST resource schemas still contain legacy snake_case fields.
      required:
        - schemaVersion
        - id
        - type
        - context
        - payload
      properties:
        schemaVersion:
          type: string
          description: Version of the factory event envelope schema.
          enum:
            - agent-factory.event.v1
          x-enum-descriptions:
            - Initial unified Agent Factory event schema.
        id:
          type: string
          description: Stable event identifier. Record/replay artifacts must preserve this value.
        type:
          $ref: '#/components/schemas/FactoryEventType'
        context:
          $ref: '#/components/schemas/FactoryEventContext'
        payload:
          oneOf:
            - $ref: '#/components/schemas/RunRequestEventPayload'
            - $ref: '#/components/schemas/InitialStructureRequestEventPayload'
            - $ref: '#/components/schemas/WorkRequestEventPayload'
            - $ref: '#/components/schemas/RelationshipChangeRequestEventPayload'
            - $ref: '#/components/schemas/DispatchRequestEventPayload'
            - $ref: '#/components/schemas/InferenceRequestEventPayload'
            - $ref: '#/components/schemas/InferenceResponseEventPayload'
            - $ref: '#/components/schemas/ScriptRequestEventPayload'
            - $ref: '#/components/schemas/ScriptResponseEventPayload'
            - $ref: '#/components/schemas/DispatchResponseEventPayload'
            - $ref: '#/components/schemas/FactoryStateResponseEventPayload'
            - $ref: '#/components/schemas/RunResponseEventPayload'
    FactoryEventType:
      type: string
      description: Canonical event vocabulary for customer-visible runtime changes. Work entering the factory is represented as WORK_REQUEST, including single-work submissions that are normalized into one-work requests.
      x-enum-varnames:
        - FactoryEventTypeRunRequest
        - FactoryEventTypeInitialStructureRequest
        - FactoryEventTypeWorkRequest
        - FactoryEventTypeRelationshipChangeRequest
        - FactoryEventTypeDispatchRequest
        - FactoryEventTypeInferenceRequest
        - FactoryEventTypeInferenceResponse
        - FactoryEventTypeScriptRequest
        - FactoryEventTypeScriptResponse
        - FactoryEventTypeDispatchResponse
        - FactoryEventTypeFactoryStateResponse
        - FactoryEventTypeRunResponse
      enum:
        - RUN_REQUEST
        - INITIAL_STRUCTURE_REQUEST
        - WORK_REQUEST
        - RELATIONSHIP_CHANGE_REQUEST
        - DISPATCH_REQUEST
        - INFERENCE_REQUEST
        - INFERENCE_RESPONSE
        - SCRIPT_REQUEST
        - SCRIPT_RESPONSE
        - DISPATCH_RESPONSE
        - FACTORY_STATE_RESPONSE
        - RUN_RESPONSE
      x-enum-descriptions:
        - A factory run request was recorded and its effective runtime configuration is known.
        - The static factory topology and configured resources are available before work moves.
        - Work entered the factory as a normalized request.
        - A relationship-change request between work items was recorded.
        - A workstation request began processing a set of input work.
        - A model-worker provider attempt is about to send a prompt to the provider.
        - A model-worker provider attempt returned from the provider boundary.
        - A script-backed worker is about to invoke one concrete command attempt.
        - A script-backed worker command attempt returned or failed before a normal exit.
        - A workstation response finished processing and produced an outcome.
        - The factory lifecycle state response was recorded.
        - A factory run response ended and final metadata is available.
    FactoryEventContext:
      type: object
      additionalProperties: false
      required:
        - sequence
        - tick
        - eventTime
      properties:
        sequence:
          type: integer
          minimum: 0
          description: Append-only event-log sequence number.
        tick:
          type: integer
          minimum: 0
          description: Logical engine tick observed by the runtime.
        eventTime:
          type: string
          format: date-time
          description: Wall-clock event timestamp for customer explanation and diagnostics. ISO8601 timestamp.
        requestId:
          type: string
          description: Canonical request identity for all request-scoped events; payload metadata must not restate it.
        traceIds:
          type: array
          description: Canonical trace identifiers that contributed to this event; payloads must not restate them.
          items:
            type: string
        workIds:
          type: array
          description: Canonical work identities correlated to this event; payloads must not restate them.
          items:
            type: string
        dispatchId:
          type: string
          description: Canonical dispatch identity for dispatch and inference events; payloads must not restate it.
        source:
          type: string
          description: Human-readable source such as api, filewatcher, replay, cron, or worker.
    DispatchConsumedWorkRef:
      type: object
      additionalProperties: false
      required:
        - workId
      description: Ordered reference to one consumed work item on a dispatch boundary. Dispatch-request payloads keep only the consumed work identity here; work type, trace, display, and other work facts must be derived from prior WORK_REQUEST events plus FactoryEvent.context.
      properties:
        workId:
          type: string
          description: Canonical work identity for one consumed dispatch input.
    DispatchRequestEventMetadata:
      type: object
      additionalProperties: false
      description: Optional non-identity dispatch metadata retained on dispatch-request events. Request, trace, work, and dispatch identity must remain on FactoryEvent.context rather than reappearing here.
      properties:
        replayKey:
          type: string
          description: Stable replay correlation key for recorded dispatch reconstruction.
    RunRequestEventPayload:
      type: object
      additionalProperties: false
      required:
        - recordedAt
        - factory
      properties:
        recordedAt:
          type: string
          format: date-time
        factory:
          $ref: '#/components/schemas/Factory'
        wallClock:
          $ref: '#/components/schemas/WallClock'
        diagnostics:
          $ref: '#/components/schemas/Diagnostics'
    InitialStructureRequestEventPayload:
      type: object
      additionalProperties: false
      required:
        - factory
      description: Runtime topology snapshot before work moves.
      properties:
        factory:
          $ref: '#/components/schemas/Factory'
        workflowId:
          type: string
        sourceDirectory:
          type: string
        metadata:
          $ref: '#/components/schemas/StringMap'
    WorkRequestEventPayload:
      type: object
      additionalProperties: false
      required:
        - type
