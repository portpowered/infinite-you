type: object
additionalProperties: false
required:
  - transitionId
  - inputs
description: >-
  Customer-visible dispatch start event. FactoryEvent.context owns dispatch,
  request, trace, and work identity. This payload keeps only non-derived
  dispatch facts first known when execution starts; workstation and worker
  topology must be reconstructed from the initial structure and the retained
  transition identifier. Ordered inputs carry consumed work references only;
  work type, trace, display, and other work facts must be rebuilt from prior
  work-request history.
properties:
  transitionId:
    type: string
  currentChainingTraceId:
    type: string
    description: Explicit chaining-trace identifier for the dispatch currently being represented.
  previousChainingTraceIds:
    type: array
    description: Explicit predecessor chaining traces consumed by this dispatch in deterministic order.
    items:
      type: string
  inputs:
    type: array
    items:
      $ref: '../../../../openapi-main.yaml#/components/schemas/DispatchConsumedWorkRef'
  resources:
    type: array
    items:
      $ref: '../../../../openapi-main.yaml#/components/schemas/Resource'
  metadata:
    $ref: '../../../../openapi-main.yaml#/components/schemas/DispatchRequestEventMetadata'
