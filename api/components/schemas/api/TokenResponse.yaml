type: object
additionalProperties: false
required:
  - id
  - placeId
  - workId
  - workType
  - traceId
  - createdAt
  - enteredAt
properties:
  id:
    type: string
  placeId:
    type: string
  name:
    type: string
  workId:
    type: string
  workType:
    type: string
  chainingTraceDepth:
    type: integer
    minimum: 1
  currentChainingTraceId:
    type: string
  previousChainingTraceIds:
    type: array
    items:
      type: string
  traceId:
    type: string
  tags:
    $ref: '../shared/StringMap.yaml'
  createdAt:
    type: string
    format: date-time
  enteredAt:
    type: string
    format: date-time
  history:
    $ref: './TokenHistory.yaml'
