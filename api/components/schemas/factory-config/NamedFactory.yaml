type: object
additionalProperties: false
description: Canonical named-factory contract used for factory activation requests and current-factory readback.
required:
  - name
  - factory
example:
  name: customer-support-triage
  factory:
    workTypes:
      - name: task
        states:
          - name: init
            type: INITIAL
          - name: done
            type: TERMINAL
    workers:
      - name: planner
        type: MODEL_WORKER
        modelProvider: claude
        executorProvider: script_wrap
        model: claude-sonnet-4-20250514
    workstations:
      - name: plan-task
        kind: STANDARD
        type: MODEL_WORKSTATION
        worker: planner
        inputs:
          - workType: task
            state: init
        outputs:
          - workType: task
            state: done
properties:
  name:
    $ref: './FactoryName.yaml'
  factory:
    $ref: './Factory.yaml'


